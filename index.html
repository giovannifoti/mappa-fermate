<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Mappa rapida delle fermate autobus ATM Messina con ricerca, preferiti e fermata più vicina." />
  <title>Quando Passa - Fermate Autobus Messina</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="preload" href="stops_fixed.json" as="fetch" type="application/json" crossorigin="anonymous">

  <!-- Leaflet & MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#003366" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="top-bar" aria-label="Strumenti mappa">
    <label class="search-box" for="searchInput">
      <span aria-hidden="true">🔍</span>
      <input type="search" id="searchInput" placeholder="Cerca una fermata" autocomplete="off" inputmode="search"/>
      <button id="clearSearch" class="clear-search" type="button" title="Cancella ricerca" aria-label="Cancella ricerca" hidden>&times;</button>
    </label>
    <button id="locateBtn" class="icon-btn" type="button" title="Trova la fermata più vicina" aria-label="Trova la fermata più vicina" aria-pressed="false">📍</button>
  </header>

  <div id="suggestions" class="suggestions" role="listbox" aria-label="Risultati ricerca"></div>
  <div id="nearestStop" class="nearest-info" role="status" aria-live="polite"></div>
  <div id="map" aria-label="Mappa fermate autobus Messina"></div>
  <div id="mapStatus" class="map-status" role="status" aria-live="polite"></div>

  <!-- Bottone preferiti -->
  <button id="open-favorites" class="floating-btn floating-btn-left" type="button" aria-label="Mostra preferiti" title="Mostra preferiti">⭐</button>

  <!-- Popup preferiti -->
  <div id="favorites-popup" class="favorites-popup" aria-hidden="true">
    <div class="fav-popup-content">
      <div class="favorites-header">
        <div>
          <h2>Preferiti</h2>
          <p id="favorites-summary" class="favorites-summary"></p>
        </div>
        <button id="close-favorites" type="button" aria-label="Chiudi preferiti">&times;</button>
      </div>
      <div id="favorites-list" class="favorites-list"></div>
      <button id="clear-favorites" class="secondary-action" type="button" hidden>Svuota preferiti</button>
    </div>
  </div>

  <!-- Leaflet & MarkerCluster JS -->
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Script principale -->
  <script defer src="script.js"></script>

  <!-- GoatCounter -->
  <script data-goatcounter="https://giovannifoti.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
